<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SlipMint Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <h2>SlipMint Demo — Connect Wallet</h2>
  <button id="connect">Connect Wallet</button>
  <div id="addr" style="margin-top:12px;word-break:break-all"></div>

  <script>
    const btn = document.getElementById('connect');
    const addr = document.getElementById('addr');

    async function connect() {
      if (window.ethereum) {
        try {
          const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
          addr.innerText = 'Address: ' + accounts[0];
        } catch (e) {
          addr.innerText = 'Connection rejected or error';
        }
      } else {
        addr.innerText = 'No injected wallet detected. Install MetaMask or use a browser with wallet support.';
      }
    }

    btn.onclick = connect;
  </script>
</body>
</html>
